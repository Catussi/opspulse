# OpsPulse — entorno local de desarrollo
# Levanta todos los servicios con: docker compose up --build

services:
  # Base de datos principal: almacena pedidos, inventario y reglas
  postgres:
    image: postgres:16-alpine
    container_name: opspulse-postgres
    environment:
      POSTGRES_USER: opspulse
      POSTGRES_PASSWORD: opspulse_dev
      POSTGRES_DB: opspulse
    ports:
      - "5433:5432"  # Host 5433: evita conflicto si otro Postgres usa 5432
    volumes:
      - datos_postgres:/var/lib/postgresql/data
      - ./datos/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspulse -d opspulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Cola de mensajes para trabajos asíncronos (ETL, alertas, webhooks)
  redis:
    image: redis:7-alpine
    container_name: opspulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API REST principal (FastAPI)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspulse-api
    command: uvicorn aplicacion.principal:aplicacion --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"  # Host 8001: evita conflicto si otro proyecto usa 8000
    environment:
      ENTORNO: desarrollo
      URL_BASE_DATOS: postgresql+psycopg://opspulse:opspulse_dev@postgres:5432/opspulse
      URL_REDIS: redis://redis:6379/0
      URL_MLFLOW: http://mlflow:5000
    volumes:
      - ./backend:/codigo
      - ./datos/crudos:/datos/crudos
      - ./transformaciones/dbt:/dbt
      - mlflow_datos:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/salud/listo')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Dashboard Angular (nginx + proxy a API)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opspulse-frontend
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy

  # Trabajador Celery: ejecuta pipelines ETL y automatizaciones en segundo plano
  trabajador:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspulse-trabajador
    command: celery -A aplicacion.trabajos.celery_app:aplicacion_celery worker --loglevel=info
    environment:
      ENTORNO: desarrollo
      URL_BASE_DATOS: postgresql+psycopg://opspulse:opspulse_dev@postgres:5432/opspulse
      URL_REDIS: redis://redis:6379/0
      URL_MLFLOW: http://mlflow:5000
    volumes:
      - ./backend:/codigo
      - ./datos/crudos:/datos/crudos
      - ./transformaciones/dbt:/dbt
      - mlflow_datos:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  # Panel opcional para monitorear tareas Celery (útil en demos)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspulse-flower
    command: celery -A aplicacion.trabajos.celery_app:aplicacion_celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      URL_REDIS: redis://redis:6379/0
    depends_on:
      - redis

  # dbt: transformaciones SQL (ejecutar bajo demanda)
  # Uso: docker compose run --rm dbt run
  dbt:
    build:
      context: ./transformaciones/dbt
      dockerfile: Dockerfile
    container_name: opspulse-dbt
    profiles: ["datos"]
    environment:
      DBT_HOST: postgres
      DBT_PORT: "5432"
    volumes:
      - ./transformaciones/dbt:/dbt
    depends_on:
      postgres:
        condition: service_healthy

  # Airflow standalone: orquestación de dbt y automatización
  # Uso: docker compose --profile datos up airflow
  # Nota: la primera vez tarda ~2-3 min instalando paquetes extra vía _PIP_ADDITIONAL_REQUIREMENTS
  airflow:
    image: apache/airflow:2.10.4-python3.12
    container_name: opspulse-airflow
    profiles: ["datos"]
    command: standalone
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://opspulse:opspulse_dev@postgres:5432/airflow
      AIRFLOW_CONN_OPSPULSE_API: http://api:8000
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-http==4.13.2
    volumes:
      - ./orquestacion/airflow/dags:/opt/airflow/dags
      - ./transformaciones/dbt:/opt/dbt
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  # MLflow: tracking de experimentos y model registry
  # UI: http://localhost:5000
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: opspulse-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_datos:/mlflow

  # --- Perfil observabilidad: Prometheus + Grafana ---
  # Uso: docker compose --profile observabilidad up

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: opspulse-prometheus
    profiles: ["observabilidad"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observabilidad/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - datos_prometheus:/prometheus
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    container_name: opspulse-grafana
    profiles: ["observabilidad"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ./observabilidad/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observabilidad/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  celery-exporter:
    image: danihodovic/celery-exporter:0.11.2
    container_name: opspulse-celery-exporter
    profiles: ["observabilidad"]
    environment:
      CE_BROKER_URL: redis://redis:6379/0
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy
      trabajador:
        condition: service_started

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: opspulse-redis-exporter
    profiles: ["observabilidad"]
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  datos_postgres:
  mlflow_datos:
  datos_prometheus:
