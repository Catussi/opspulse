# Prometheus — OpsPulse (desarrollo local)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: opspulse-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
