name: Publicar imágenes Docker

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/publicar-imagenes.yml"

permissions:
  contents: read
  packages: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: backend
            imagen: opspulse-api
          - context: frontend
            imagen: opspulse-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Owner en minúsculas (requerido por GHCR)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/${{ matrix.imagen }}:latest
            ghcr.io/${{ steps.ghcr.outputs.owner }}/${{ matrix.imagen }}:${{ github.sha }}
